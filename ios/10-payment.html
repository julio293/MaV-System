<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment — iOS — MaV</title>
<link rel="stylesheet" href="../css/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bc-surface-ios);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased}
.device{width:393px;height:852px;border-radius:54px;background:#1c1c1e;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.35),inset 0 0 0 2px #3a3a3c,inset 0 0 0 3px #1c1c1e;overflow:hidden;flex-shrink:0}
.device-screen{position:absolute;inset:0;border-radius:52px;overflow:hidden;background:var(--bc-surface);display:flex;flex-direction:column}
.di{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:100}
.status{position:absolute;top:0;left:0;right:0;padding:16px 28px 0;display:flex;align-items:center;justify-content:space-between;z-index:99;height:54px}
.status-time{font-size:15px;font-weight:600;color:var(--bc-black);padding-left:8px}
.status-icons{display:flex;align-items:center;gap:6px;padding-right:8px}
.status-icons svg{fill:var(--bc-black)}
.home{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--bc-black);border-radius:3px;opacity:.2;z-index:99}
/* Nav */
.nav-bar{background:var(--bc-white);padding:54px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bc-surface)}
.back-btn{display:flex;align-items:center;padding:4px;background:none;border:none;cursor:pointer}
.nav-title{font-size:17px;font-weight:700;color:var(--bc-black);letter-spacing:-.01em}
/* Scroll */
.scroll-body{flex:1;overflow-y:auto;padding:16px 16px 100px}
/* Recipient */
.recipient-card{background:var(--bc-white);border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rec-avatar{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--bc-primary-light),var(--bc-tertiary1));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--bc-white);flex-shrink:0}
.rec-name{font-size:16px;font-weight:700;color:var(--bc-black)}
.rec-acct{font-size:13px;color:var(--bc-mono300-l);font-family:'JetBrains Mono',monospace}
.rec-change{font-size:13px;font-weight:600;color:var(--bc-primary-light);margin-left:auto}
/* Amount input */
.amount-card{background:var(--bc-white);border-radius:16px;padding:20px;margin-bottom:12px;text-align:center}
.amount-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--bc-mono300-l);margin-bottom:12px}
.amount-input{font-size:48px;font-weight:800;color:var(--bc-black);font-family:'JetBrains Mono',monospace;letter-spacing:-.03em;border:none;background:transparent;text-align:center;width:100%;outline:none}
.amount-avail{font-size:13px;color:var(--bc-mono300-l);margin-top:6px}
.amount-avail span{color:var(--bc-primary-light);font-weight:600}
/* Quick amounts */
.quick-amounts{display:flex;gap:8px;justify-content:center;margin-top:14px}
.qa-pill{padding:7px 14px;border-radius:20px;background:var(--bc-surface);font-size:13px;font-weight:600;color:var(--bc-primary-light);border:none;cursor:pointer;font-family:inherit}
.qa-pill:active{background:var(--mav-bg-tertiary)}
/* Memo */
.memo-card{background:var(--bc-white);border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.memo-card input{flex:1;border:none;background:transparent;font-size:15px;font-family:inherit;color:var(--bc-black);outline:none}
.memo-card input::placeholder{color:var(--bc-mono300-l)}
/* Summary */
.summary-card{background:var(--bc-white);border-radius:16px;padding:16px;margin-bottom:12px}
.sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sum-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid var(--bc-surface)}
.sum-label{font-size:14px;color:var(--bc-mono500)}
.sum-value{font-size:14px;font-weight:600;color:var(--bc-black)}
.sum-total{font-size:16px;font-weight:800;color:var(--bc-black)}
/* Send CTA — slider */
.cta-wrap{position:absolute;bottom:28px;left:16px;right:16px;z-index:50}
.slider-btn{
  position:relative;overflow:hidden;width:100%;height:60px;
  border-radius:16px;background:var(--mav-primary);
  border:none;cursor:pointer;user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;
}
.slider-fill{
  position:absolute;inset:0;
  background:var(--mav-secondary);border-radius:16px;
  width:0%;transition:none;pointer-events:none;
}
.slider-handle{
  position:absolute;left:6px;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:12px;
  background:var(--bc-white);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;z-index:2;pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  transition:none;
}
.slider-handle svg{stroke:var(--mav-primary);fill:none;width:20px;height:20px}
.slider-label{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;padding-left:60px;
  font-size:16px;font-weight:700;color:rgba(255,255,255,.9);
  pointer-events:none;z-index:1;font-family:'Plus Jakarta Sans',sans-serif;
  letter-spacing:-.01em;
}
.slider-btn.completed .slider-label{opacity:0}
.slider-btn.completed .slider-handle svg{stroke:var(--mav-primary)}
.slider-btn.completed .slider-fill{width:100%;background:var(--mav-secondary)}
/* Success sheet */
.success-sheet{position:absolute;inset:0;background:var(--bc-white);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);border-radius:52px;z-index:200}
.success-sheet.show{transform:translateY(0)}
.success-icon{width:80px;height:80px;border-radius:24px;background:var(--bc-success-soft);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.success-title{font-size:26px;font-weight:800;color:var(--bc-black);letter-spacing:-.03em;margin-bottom:8px;text-align:center}
.success-amount{font-size:40px;font-weight:800;color:var(--bc-success);letter-spacing:-.03em;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.success-sub{font-size:15px;color:var(--bc-mono500);text-align:center;margin-bottom:32px}
.btn-done{width:100%;padding:16px;border-radius:14px;background:var(--bc-primary-light);color:var(--bc-white);font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.back-link{text-align:center;margin-top:24px;font-size:13px;color:var(--bc-mono500)}
.back-link a{color:var(--bc-primary-light);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="device">
  <div class="device-screen">
    <div class="di"></div>
    <div class="status">
      <span class="status-time">9:41</span>
      <div class="status-icons"><svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="3" stroke="var(--bc-black)" stroke-width="1.5" fill="none"/><rect x="2" y="3" width="14" height="6" rx="1.5" fill="var(--bc-black)"/><path d="M22.5 4.5v3a1.5 1.5 0 000-3z"/></svg></div>
    </div>

    <div class="nav-bar">
      <button class="back-btn" onclick="window.location.href='04-home.html'">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1.5L2 8l6.5 6.5" stroke="var(--bc-primary-light)" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="nav-title">Send Money</span>
    </div>

    <div class="scroll-body">
      <div class="recipient-card">
        <div class="rec-avatar">JL</div>
        <div>
          <div class="rec-name">Jamie Lee</div>
          <div class="rec-acct">•••• 7842</div>
        </div>
        <span class="rec-change">Change</span>
      </div>

      <div class="amount-card">
        <div class="amount-label">Amount</div>
        <input class="amount-input" type="text" value="₦250,000.00" id="amountInput">
        <div class="amount-avail">Available: <span>₦24,389,500</span></div>
        <div class="quick-amounts">
          <button class="qa-pill" onclick="setAmt('50000')">₦50K</button>
          <button class="qa-pill" onclick="setAmt('100000')">₦100K</button>
          <button class="qa-pill" onclick="setAmt('250000')">₦250K</button>
          <button class="qa-pill" onclick="setAmt('500000')">₦500K</button>
        </div>
      </div>

      <div class="memo-card">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="var(--bc-mono300-l)" stroke-width="1.5"/><path d="M5 7h8M5 10h5" stroke="var(--bc-mono300-l)" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Add a note (optional)" value="Dinner split">
      </div>

      <div class="summary-card">
        <div class="sum-row"><span class="sum-label">Amount</span><span class="sum-value">₦250,000.00</span></div>
        <div class="sum-row"><span class="sum-label">Transfer fee</span><span class="sum-value">Free</span></div>
        <div class="sum-row"><span class="sum-label">Total</span><span class="sum-total">₦250,000.00</span></div>
      </div>
    </div>

    <div class="cta-wrap">
      <div class="slider-btn" id="sliderBtn">
        <div class="slider-fill" id="sliderFill"></div>
        <div class="slider-handle" id="sliderHandle">
          <svg viewBox="0 0 20 20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 10 16 10"/><polyline points="11 5 16 10 11 15"/></svg>
        </div>
        <span class="slider-label" id="sliderLabel">Slide to Send ₦250,000.00</span>
      </div>
    </div>

    <!-- Success sheet -->
    <div class="success-sheet" id="successSheet">
      <div class="success-icon"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M8 18l6 6 14-14" stroke="var(--bc-success)" stroke-width="3" stroke-linecap="round"/></svg></div>
      <div class="success-title">Payment Sent!</div>
      <div class="success-amount">₦250,000.00</div>
      <div class="success-sub">Sent to Jamie Lee &nbsp;·&nbsp; •••• 7842</div>
      <button class="btn-done" onclick="window.location.href='04-home.html'">Back to Home</button>
    </div>

    <div class="home"></div>
  </div>
</div>

<div class="back-link">
  <a href="09-explore.html">← Explore</a> &nbsp;·&nbsp;
  <a href="../android/01-onboarding.html">Android Screens →</a>
</div>

<script>
function setAmt(v){
  var numStr = v.replace(/[^0-9]/g,'');
  var display = '₦' + parseInt(numStr).toLocaleString() + '.00';
  document.getElementById('amountInput').value = display;
  document.getElementById('sliderLabel').textContent = 'Slide to Send ' + display;
  document.querySelectorAll('.sum-value')[0].textContent = display;
  document.querySelector('.sum-total').textContent = display;
  document.querySelector('.success-amount').textContent = display;
}
function showSuccess(){ document.getElementById('successSheet').classList.add('show'); }

(function(){
  var btn = document.getElementById('sliderBtn');
  var handle = document.getElementById('sliderHandle');
  var fill = document.getElementById('sliderFill');
  var dragging = false;
  var startX = 0;
  var handleLeft = 6;
  var maxLeft;

  function getMaxLeft(){
    return btn.offsetWidth - handle.offsetWidth - 6;
  }

  function setPos(x){
    maxLeft = getMaxLeft();
    var clamped = Math.max(6, Math.min(x, maxLeft));
    handle.style.left = clamped + 'px';
    var pct = ((clamped - 6) / (maxLeft - 6)) * 100;
    fill.style.width = pct + '%';
    // fade label as handle moves right
    var labelOpacity = Math.max(0, 1 - pct / 60);
    document.getElementById('sliderLabel').style.opacity = labelOpacity;
    return pct;
  }

  function onStart(e){
    if(btn.classList.contains('completed')) return;
    dragging = true;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    handleLeft = parseInt(handle.style.left) || 6;
    handle.style.transition = 'none';
    fill.style.transition = 'none';
    e.preventDefault();
  }

  function onMove(e){
    if(!dragging) return;
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var dx = cx - startX;
    var pct = setPos(handleLeft + dx);
    if(pct >= 95) onComplete();
    e.preventDefault();
  }

  function onEnd(e){
    if(!dragging) return;
    dragging = false;
    var currentLeft = parseInt(handle.style.left) || 6;
    maxLeft = getMaxLeft();
    var pct = ((currentLeft - 6) / (maxLeft - 6)) * 100;
    if(pct < 95){
      handle.style.transition = 'left .3s cubic-bezier(.4,0,.2,1)';
      fill.style.transition = 'width .3s cubic-bezier(.4,0,.2,1)';
      document.getElementById('sliderLabel').style.transition = 'opacity .3s';
      handle.style.left = '6px';
      fill.style.width = '0%';
      document.getElementById('sliderLabel').style.opacity = 1;
    }
  }

  function onComplete(){
    dragging = false;
    maxLeft = getMaxLeft();
    handle.style.transition = 'left .2s cubic-bezier(.4,0,.2,1)';
    fill.style.transition = 'width .2s cubic-bezier(.4,0,.2,1)';
    handle.style.left = maxLeft + 'px';
    fill.style.width = '100%';
    btn.classList.add('completed');
    setTimeout(showSuccess, 250);
  }

  btn.addEventListener('mousedown', onStart);
  btn.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
})();
</script>
</body>
</html>
