<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment — Android — MaV</title>
<link rel="stylesheet" href="../css/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bc-mono100-l);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased}
.device{width:393px;height:851px;border-radius:48px;background:var(--bc-black);position:relative;box-shadow:0 32px 80px rgba(0,0,0,.4),inset 0 0 0 1.5px var(--mav-border);overflow:hidden;flex-shrink:0}
.device-screen{position:absolute;inset:0;border-radius:46px;overflow:hidden;background:var(--bc-surface);display:flex;flex-direction:column}
.ph{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#000;border-radius:50%;z-index:100}
.status{position:absolute;top:0;left:0;right:0;padding:14px 28px 0;display:flex;align-items:center;justify-content:space-between;z-index:99;height:48px}
.status-time{font-size:13px;font-weight:600;color:var(--bc-black)}
.status-icons{display:flex;align-items:center;gap:5px}
.nav-gesture{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:4px;background:var(--bc-black);border-radius:2px;opacity:.15;z-index:99}
/* Top bar */
.top-bar{background:var(--bc-white);padding:50px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bc-grey)}
.back-btn{width:40px;height:40px;border-radius:12px;background:var(--bc-surface);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.top-title{font-size:17px;font-weight:700;color:var(--bc-black)}
/* Scroll */
.scroll-body{flex:1;overflow-y:auto;padding:14px 16px 100px}
/* Recipient */
.recipient-card{background:var(--bc-white);border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.rec-avatar{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--bc-primary-light),var(--bc-tertiary1));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--bc-white);flex-shrink:0}
.rec-name{font-size:16px;font-weight:700;color:var(--bc-black)}
.rec-acct{font-size:13px;color:var(--bc-mono300-l);font-family:'JetBrains Mono',monospace}
.rec-change{font-size:13px;font-weight:600;color:var(--bc-primary-light);margin-left:auto}
/* Amount */
.amount-card{background:var(--bc-white);border-radius:16px;padding:20px;margin-bottom:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.amount-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--bc-mono300-l);margin-bottom:12px}
.amount-input{font-size:48px;font-weight:800;color:var(--bc-black);font-family:'JetBrains Mono',monospace;letter-spacing:-.03em;border:none;background:transparent;text-align:center;width:100%;outline:none}
.amount-avail{font-size:13px;color:var(--bc-mono300-l);margin-top:6px}
.amount-avail span{color:var(--bc-primary-light);font-weight:600}
.quick-amounts{display:flex;gap:8px;justify-content:center;margin-top:14px}
.qa-pill{padding:7px 14px;border-radius:20px;background:var(--bc-surface);font-size:13px;font-weight:600;color:var(--bc-primary-light);border:none;cursor:pointer;font-family:inherit;transition:background .12s}
.qa-pill:active{background:var(--mav-bg-tertiary)}
/* Memo */
.memo-card{background:var(--bc-white);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.memo-card input{flex:1;border:none;background:transparent;font-size:15px;font-family:inherit;color:var(--bc-black);outline:none}
.memo-card input::placeholder{color:var(--bc-mono300-l)}
/* Summary */
.summary-card{background:var(--bc-white);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sum-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid var(--bc-surface)}
.sum-label{font-size:14px;color:var(--bc-mono500)}
.sum-value{font-size:14px;font-weight:600;color:var(--bc-black)}
.sum-total{font-size:16px;font-weight:800;color:var(--bc-black)}
/* CTA */
.cta-wrap{position:absolute;bottom:28px;left:16px;right:16px;z-index:50}
.btn-send{width:100%;padding:18px;border-radius:16px;background:var(--bc-primary-light);color:var(--bc-white);font-size:17px;font-weight:700;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;box-shadow:0 6px 20px rgba(53,46,255,.3)}
.btn-send:active{transform:scale(.97);background:var(--bc-tertiary2)}
/* Success sheet */
.success-sheet{position:absolute;inset:0;background:var(--bc-white);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);border-radius:46px;z-index:200}
.success-sheet.show{transform:translateY(0)}
.success-icon{width:80px;height:80px;border-radius:24px;background:rgba(98,156,40,.1);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.success-title{font-size:26px;font-weight:800;color:var(--bc-black);letter-spacing:-.03em;margin-bottom:8px;text-align:center}
.success-amount{font-size:40px;font-weight:800;color:var(--bc-success);letter-spacing:-.03em;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.success-sub{font-size:15px;color:var(--bc-mono500);text-align:center;margin-bottom:32px}
.btn-done{width:100%;padding:16px;border-radius:14px;background:var(--bc-primary-light);color:var(--bc-white);font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.back-link{text-align:center;margin-top:24px;font-size:13px;color:var(--bc-mono500)}
.back-link a{color:var(--bc-primary-light);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="device">
  <div class="device-screen">
    <div class="ph"></div>
    <div class="status">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--bc-black)"><rect x="0" y="4" width="2.5" height="8" rx="1"/><rect x="4" y="2.5" width="2.5" height="9.5" rx="1"/><rect x="8" y="1" width="2.5" height="11" rx="1"/><rect x="12" y="0" width="2.5" height="12" rx="1" opacity=".3"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12"><rect x="0" y="1" width="20" height="10" rx="3" stroke="var(--bc-black)" stroke-width="1.5" fill="none"/><rect x="2" y="3" width="13" height="6" rx="1.5" fill="var(--bc-black)"/><path d="M21.5 4.5v3a1.5 1.5 0 000-3z" fill="var(--bc-black)"/></svg>
      </div>
    </div>

    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='04-home.html'">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1.5L2 8l6.5 6.5" stroke="var(--bc-primary-light)" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="top-title">Send Money</span>
    </div>

    <div class="scroll-body">
      <div class="recipient-card">
        <div class="rec-avatar">JL</div>
        <div>
          <div class="rec-name">Jamie Lee</div>
          <div class="rec-acct">•••• 7842</div>
        </div>
        <span class="rec-change">Change</span>
      </div>

      <div class="amount-card">
        <div class="amount-label">Amount</div>
        <input class="amount-input" type="text" value="$250.00" id="amountInput">
        <div class="amount-avail">Available: <span>$24,389.50</span></div>
        <div class="quick-amounts">
          <button class="qa-pill" onclick="setAmt('$50')">$50</button>
          <button class="qa-pill" onclick="setAmt('$100')">$100</button>
          <button class="qa-pill" onclick="setAmt('$250')">$250</button>
          <button class="qa-pill" onclick="setAmt('$500')">$500</button>
        </div>
      </div>

      <div class="memo-card">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="var(--bc-mono300-l)" stroke-width="1.5"/><path d="M5 7h8M5 10h5" stroke="var(--bc-mono300-l)" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Add a note (optional)" value="Dinner split">
      </div>

      <div class="summary-card">
        <div class="sum-row"><span class="sum-label">Amount</span><span class="sum-value">$250.00</span></div>
        <div class="sum-row"><span class="sum-label">Transfer fee</span><span class="sum-value">Free</span></div>
        <div class="sum-row"><span class="sum-label">Total</span><span class="sum-total">$250.00</span></div>
      </div>
    </div>

    <div class="cta-wrap">
      <button class="btn-send" onclick="showSuccess()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10l12 0M14 6l4 4-4 4" stroke="var(--bc-white)" stroke-width="2" stroke-linecap="round"/></svg>
        Send $250.00
      </button>
    </div>

    <div class="success-sheet" id="successSheet">
      <div class="success-icon"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M8 18l6 6 14-14" stroke="var(--bc-success)" stroke-width="3" stroke-linecap="round"/></svg></div>
      <div class="success-title">Payment Sent!</div>
      <div class="success-amount">$250.00</div>
      <div class="success-sub">Sent to Jamie Lee &nbsp;·&nbsp; •••• 7842</div>
      <button class="btn-done" onclick="window.location.href='04-home.html'">Back to Home</button>
    </div>

    <div class="nav-gesture"></div>
  </div>
</div>
<div class="back-link">
  <a href="09-explore.html">← Explore</a> &nbsp;·&nbsp;
  <a href="../web/01-landing.html">Web Screens →</a>
</div>
<script>
function setAmt(v){
  document.getElementById('amountInput').value=v+'.00';
  const btn=document.querySelector('.btn-send');
  btn.innerHTML='<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10l12 0M14 6l4 4-4 4" stroke="var(--bc-white)" stroke-width="2" stroke-linecap="round"/></svg> Send '+v+'.00';
}
function showSuccess(){document.getElementById('successSheet').classList.add('show');}
</script>
</body>
</html>
