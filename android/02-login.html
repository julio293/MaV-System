<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Android — MaV</title>
<link rel="stylesheet" href="../css/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bc-mono100-l);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased}
.device{width:393px;height:851px;border-radius:48px;background:var(--bc-black);position:relative;box-shadow:0 32px 80px rgba(0,0,0,.4),inset 0 0 0 1.5px var(--mav-border);overflow:hidden;flex-shrink:0}
.device-screen{position:absolute;inset:0;border-radius:46px;overflow:hidden;background:var(--bc-white);display:flex;flex-direction:column}
.ph{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#000;border-radius:50%;z-index:100}
.status{position:absolute;top:0;left:0;right:0;padding:14px 28px 0;display:flex;align-items:center;justify-content:space-between;z-index:99;height:48px}
.status-time{font-size:13px;font-weight:600;color:var(--bc-black)}
.status-icons{display:flex;align-items:center;gap:5px}
.nav-gesture{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:4px;background:var(--bc-black);border-radius:2px;opacity:.15;z-index:99}
/* Layout */
.scroll-body{flex:1;overflow-y:auto;padding:64px 28px 40px;display:flex;flex-direction:column}
/* Brand */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.brand-icon{width:44px;height:44px;border-radius:14px;background:var(--bc-primary-light);display:flex;align-items:center;justify-content:center}
.brand-name{font-size:22px;font-weight:800;color:var(--bc-black);letter-spacing:-.02em}
/* Heading */
.login-title{font-size:26px;font-weight:800;color:var(--bc-black);letter-spacing:-.03em;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--bc-mono500);margin-bottom:28px}
/* Inputs — Material-ish outlined style */
.field{margin-bottom:16px}
.field-label{font-size:12px;font-weight:600;color:var(--bc-mono500);margin-bottom:6px;display:block}
.field input{width:100%;padding:14px 16px;border:1.5px solid var(--bc-mono100-l);border-radius:12px;font-size:15px;font-family:inherit;color:var(--bc-black);outline:none;background:var(--bc-surface-soft);transition:border .15s,box-shadow .15s}
.field input:focus{border-color:var(--bc-primary-light);box-shadow:0 0 0 3px rgba(53,46,255,.1);background:var(--bc-white)}
.field input::placeholder{color:var(--bc-mono200-l)}
.forgot{text-align:right;font-size:13px;font-weight:600;color:var(--bc-primary-light);margin-top:-8px;margin-bottom:20px}
/* Buttons */
.btn-primary{width:100%;padding:16px;border-radius:14px;background:var(--bc-primary-light);color:var(--bc-white);font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;margin-bottom:16px;transition:transform .12s,background .12s}
.btn-primary:active{transform:scale(.97);background:var(--bc-tertiary2)}
/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.div-line{flex:1;height:1px;background:var(--bc-grey)}
.div-txt{font-size:12px;color:var(--bc-mono300-l);font-weight:500}
/* Social */
.social-row{display:flex;gap:10px;margin-bottom:24px}
.btn-social{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--bc-mono100-l);background:var(--bc-white);font-size:13px;font-weight:600;color:var(--bc-black);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}
/* Sign up */
.signup-row{text-align:center;font-size:14px;color:var(--bc-mono500)}
.signup-row a{color:var(--bc-primary-light);font-weight:600;text-decoration:none}
.back-link{text-align:center;margin-top:24px;font-size:13px;color:var(--bc-mono500)}
.back-link a{color:var(--bc-primary-light);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="device">
  <div class="device-screen">
    <div class="ph"></div>
    <div class="status">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--bc-black)"><rect x="0" y="4" width="2.5" height="8" rx="1"/><rect x="4" y="2.5" width="2.5" height="9.5" rx="1"/><rect x="8" y="1" width="2.5" height="11" rx="1"/><rect x="12" y="0" width="2.5" height="12" rx="1" opacity=".3"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12"><rect x="0" y="1" width="20" height="10" rx="3" stroke="var(--bc-black)" stroke-width="1.5" fill="none"/><rect x="2" y="3" width="13" height="6" rx="1.5" fill="var(--bc-black)"/><path d="M21.5 4.5v3a1.5 1.5 0 000-3z" fill="var(--bc-black)"/></svg>
      </div>
    </div>

    <div class="scroll-body">
      <div class="brand">
        <div class="brand-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="3" fill="var(--bc-white)"/><rect x="13" y="2" width="9" height="9" rx="3" fill="rgba(255,255,255,.5)"/><rect x="2" y="13" width="9" height="9" rx="3" fill="rgba(255,255,255,.3)"/><rect x="13" y="13" width="9" height="9" rx="3" fill="rgba(255,255,255,.7)"/></svg>
        </div>
        <span class="brand-name">MaV</span>
      </div>

      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to your account to continue</div>

      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" placeholder="you@example.com" value="alex.kim@example.com">
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" placeholder="••••••••" value="password123">
      </div>
      <div class="forgot">Forgot password?</div>

      <button class="btn-primary" onclick="window.location.href='03-otp.html'">Sign In</button>

      <div class="divider"><div class="div-line"></div><span class="div-txt">or continue with</span><div class="div-line"></div></div>

      <div class="social-row">
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="#1877F2"><path d="M18 9a9 9 0 10-10.406 8.892V11.6H5.31V9h2.284V7.017C7.594 4.762 8.978 3.5 11.04 3.5c.954 0 1.952.17 1.952.17V5.8h-1.1c-1.082 0-1.42.671-1.42 1.36V9h2.416l-.386 2.6h-2.03v6.292A9.003 9.003 0 0018 9z"/></svg>
          Facebook
        </button>
      </div>

      <div class="signup-row">Don't have an account? <a href="01-onboarding.html">Sign up</a></div>
    </div>
    <div class="nav-gesture"></div>
  </div>
</div>
<div class="back-link">
  <a href="01-onboarding.html">← Onboarding</a> &nbsp;·&nbsp;
  <a href="03-otp.html">Next: OTP →</a>
</div>
</body>
</html>
